<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MAYI Managed AI Infrastructure Architecture</title>
  <desc id="desc">Public-safe architecture diagram showing user devices connecting through secure access to an Ubuntu VPS, OpenClaw Gateway, memory store, automation skills, and LLM providers. Sensitive infrastructure details are omitted.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08111f"/><stop offset="1" stop-color="#101827"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/></filter>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:42px;font-weight:800;fill:#f8fafc}.sub{font-family:Arial,Helvetica,sans-serif;font-size:20px;fill:#a5b4fc}.label{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;fill:#f8fafc}.small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#cbd5e1}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#94a3b8}.card{fill:#111827;stroke:#334155;stroke-width:2;rx:22;filter:url(#shadow)}.primary{stroke:#8b5cf6;stroke-width:3}.flow{stroke:url(#accent);stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#22d3ee;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow2)}.chip{fill:#1e293b;stroke:#475569;stroke-width:1;rx:12}.chiptext{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#e2e8f0}.safe{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#94a3b8}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#22d3ee"/></marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#22d3ee"/></marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/><circle cx="1060" cy="80" r="160" fill="#312e81" opacity="0.18"/><circle cx="120" cy="680" r="180" fill="#0e7490" opacity="0.12"/>
  <text x="64" y="72" class="title">MAYI — Managed AI Infrastructure</text><text x="66" y="108" class="sub">Self-hosted OpenClaw agentic gateway for secure automation, memory, and multi-channel workflows</text>
  <rect x="54" y="150" width="230" height="150" class="card"/><text x="84" y="198" class="label">User Devices</text><text x="84" y="228" class="small">Web UI</text><text x="84" y="254" class="small">Telegram</text><text x="84" y="280" class="tiny">Browser + mobile channels</text>
  <rect x="370" y="150" width="210" height="150" class="card"/><text x="405" y="198" class="label">Secure Access</text><text x="405" y="228" class="small">SSH Tunnel</text><text x="405" y="254" class="small">Token Auth</text><text x="405" y="280" class="tiny">Controlled exposure</text>
  <rect x="660" y="150" width="210" height="150" class="card primary"/><text x="704" y="198" class="label">Ubuntu VPS</text><text x="704" y="228" class="small">Linux host</text><text x="704" y="254" class="small">Systemd concepts</text><text x="704" y="280" class="tiny">Self-hosted runtime</text>
  <rect x="945" y="150" width="210" height="150" class="card primary"/><text x="978" y="198" class="label">OpenClaw</text><text x="978" y="228" class="small">Agent Gateway</text><text x="978" y="254" class="small">Auth Layer</text><text x="978" y="280" class="tiny">Orchestration core</text>
  <path d="M284 225 C320 225 335 225 370 225" class="flow"/><path d="M580 225 C615 225 630 225 660 225" class="flow"/><path d="M870 225 C905 225 920 225 945 225" class="flow"/>
  <rect x="115" y="430" width="260" height="150" class="card"/><text x="150" y="476" class="label">Memory Store</text><text x="150" y="506" class="small">Long-term context</text><text x="150" y="532" class="small">JSON knowledge store</text><text x="150" y="558" class="tiny">State and recall</text>
  <rect x="470" y="430" width="260" height="150" class="card"/><text x="505" y="476" class="label">Automation Skills</text><text x="505" y="506" class="small">Tool-based workflows</text><text x="505" y="532" class="small">Business operations</text><text x="505" y="558" class="tiny">Extensible actions</text>
  <rect x="825" y="430" width="260" height="150" class="card"/><text x="860" y="476" class="label">LLM Providers</text><text x="860" y="506" class="small">OpenRouter routing</text><text x="860" y="532" class="small">Model responses</text><text x="860" y="558" class="tiny">Provider abstraction</text>
  <path d="M1050 300 C1050 350 955 350 955 430" class="flow"/><path d="M1000 300 C900 370 620 360 600 430" class="dash"/><path d="M970 300 C770 385 265 360 245 430" class="dash"/>
  <rect x="64" y="642" width="1072" height="66" rx="18" fill="#0f172a" stroke="#334155" stroke-width="2"/><text x="92" y="682" class="safe">Public-safe edition: IP addresses, tokens, API keys, usernames, hostnames, private paths, and live access URLs are redacted or generalized.</text>
  <rect x="770" y="52" width="112" height="30" class="chip"/><text x="790" y="72" class="chiptext">Ubuntu 24.04</text><rect x="894" y="52" width="92" height="30" class="chip"/><text x="913" y="72" class="chiptext">OpenClaw</text><rect x="998" y="52" width="100" height="30" class="chip"/><text x="1016" y="72" class="chiptext">OpenRouter</text>
</svg>
